name: KK Story (taeglich)

# Postet taeglich ZWEI Stories (morgens + abends), damit mind. 2/Tag laufen und
# durchgehend eine aktiv ist (Stories laufen nach 24 h ab).
# 05:30 + 15:30 UTC = ~07:30 + ~17:30 Zurich (Sommer). Vorgerenderte Kacheln -> kein Chrome in CI.
on:
  schedule:
    - cron: "30 5 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch: {}   # manueller Test-Trigger

permissions:
  contents: write

concurrency:
  group: kk-story
  cancel-in-progress: false

jobs:
  story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Taegliche Story posten
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: python3 run_story.py

      - name: Ledger sichern
        if: always()
        run: |
          if [[ -n "$(git status --porcelain story_ledger.json)" ]]; then
            git config user.name "kk-autopilot-bot"
            git config user.email "bot@users.noreply.github.com"
            git add story_ledger.json
            git commit -m "chore: story posted $(date -u +%FT%TZ)"
            git push
          fi
