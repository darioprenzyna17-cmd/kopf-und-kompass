name: Kopf & Kompass Autopilot Watchdog

# Prueft einmal taeglich abends, ob heute ein Post rausging. Wenn nicht, postet der
# Waechter ein Evergreen-Ersatzmotiv, damit der Account nie stumm bleibt.
on:
  # ALTE ROUTINE ABGESCHALTET (2026-07-14): kein automatisches Evergreen-Posten mehr
  # (postete alten Stat-Stil). Nur noch manuell ausloesbar.
  # schedule:
  #   - cron: "0 19 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kk-autopilot-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Waechter ausfuehren
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 watchdog.py

      - name: Rotations-Status sichern
        if: always()
        run: |
          if [[ -n "$(git status --porcelain evergreen_state.json)" ]]; then
            git config user.name "kk-autopilot-bot"
            git config user.email "bot@users.noreply.github.com"
            git add evergreen_state.json
            git commit -m "chore: watchdog-state $(date -u +%FT%TZ)"
            git push
          fi
