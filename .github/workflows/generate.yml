name: Kopf & Kompass Autopilot Generator

# Erzeugt woechentlich eine Woche Content (Foto/Carousel/Animation) via kie.ai + Chrome-Render,
# fuellt queue.jsonl und pusht. Laeuft in der Cloud, damit kein Mac noetig ist.
on:
  # Cheap-Content-Generator (Carousel/Animation/Bild) fuer die Nicht-Reel-Tage der
  # SCHEDULE (Di/Do/Fr/So). Reel-Tage (Mo/Mi/Sa) ueberspringt generate_week.py, die
  # macht reel.yml aus der Pipeline. Laeuft Sonntag frueh fuer die kommende Woche.
  schedule:
    - cron: "0 3 * * 0"     # Sonntag 03:00 UTC (~05:00 Zurich)
  workflow_dispatch:
    inputs:
      mode:
        description: "check = nur Umgebung testen (kein Content), run = ganze Woche generieren"
        default: "check"
        type: choice
        options: [check, run]

permissions:
  contents: write

concurrency:
  group: kk-autopilot-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Chrome installieren
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: ffmpeg installieren
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generieren
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          git config user.name "kk-autopilot-bot"
          git config user.email "bot@users.noreply.github.com"
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="run"; fi   # scheduled -> volle Generierung
          if [ "$MODE" = "check" ]; then
            python3 generate_week.py --check
          else
            python3 generate_week.py
          fi
