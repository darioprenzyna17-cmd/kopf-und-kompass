name: Kopf & Kompass Autopilot Poster

# Postet faellige Eintraege aus queue.jsonl. Laeuft alle 30 Minuten (UTC),
# damit auch tageszeitgenaue Posts (z. B. 07:30 oder 12:15 Zurich) getroffen werden.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # manueller Test-Trigger

permissions:
  contents: write          # damit der Job die aktualisierte queue.jsonl committen kann

concurrency:
  group: kk-autopilot-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Poste faellige Eintraege
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: python3 scheduler.py --live

      - name: Queue-Aenderung sichern
        if: always()   # Status auch sichern, wenn ein einzelner Post fehlschlug
        run: |
          if [[ -n "$(git status --porcelain queue.jsonl)" ]]; then
            git config user.name "kk-autopilot-bot"
            git config user.email "bot@users.noreply.github.com"
            git add queue.jsonl
            git commit -m "chore: post-status $(date -u +%FT%TZ)"
            git push
          fi
