name: Kopf & Kompass Autopilot Reel-Builder

# Baut an den Reel-Tagen (Mo/Mi/Sa) das naechste freigegebene Konzept aus reel_pipeline.json
# via Veo + Schnitt und plant es in queue.jsonl ein. Laeuft in der Cloud (Mac-off).
# Der Poster (post.yml) veroeffentlicht es dann zur geplanten Zeit.
on:
  schedule:
    - cron: "0 6 * * 1,3,6"   # Mo/Mi/Sa 06:00 UTC (~08:00 Zurich), vor dem Post-Fenster
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kk-autopilot-reel
  cancel-in-progress: false

jobs:
  reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Chrome installieren
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: ffmpeg installieren
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Naechstes Reel bauen + einplanen
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          git config user.name "kk-autopilot-bot"
          git config user.email "bot@users.noreply.github.com"
          git fetch -q origin main && git rebase -q origin/main || true
          python3 build_video_reel.py --pipeline

      - name: Aenderungen sichern (Reel + Queue + Pipeline)
        if: always()
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore: reel gebaut + eingeplant $(date -u +%FT%TZ)"
            git push origin main || (git fetch -q origin main && git rebase -q origin/main && git push origin main)
          fi
