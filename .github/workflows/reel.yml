name: Kopf & Kompass Autopilot Reel

# Baut taeglich das naechste approved-Konzept im Archivkino-Look und postet es direkt
# nach @kopfundkompass. Komplett autonom, kein Mac noetig. Nur Ledger wird committet.
on:
  schedule:
    - cron: "0 6 * * *"     # taeglich 06:00 UTC (~08:00 Zurich)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kk-autopilot-reel
  cancel-in-progress: false

jobs:
  build_post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Chrome installieren
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: ffmpeg installieren
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Bauen + Posten
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: python3 cloud_build_post.py

      - name: Ledger sichern
        if: always()
        run: |
          if [[ -n "$(git status --porcelain reel_pipeline.json used_reels.json)" ]]; then
            git config user.name "kk-autopilot-bot"
            git config user.email "bot@users.noreply.github.com"
            git add reel_pipeline.json used_reels.json
            git commit -m "chore: reel gepostet $(date -u +%FT%TZ)"
            git push
          fi
